apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-web
  namespace: production
spec:
  replicas: 3
  strategy:
    blueGreen:
      activeService: demo-web-active
      previewService: demo-web-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 600
      prePromotionAnalysis:
        templates:
        - templateName: success-rate
        args:
        - name: service-name
          value: demo-web
        - name: namespace
          value: production
  selector:
    matchLabels:
      app: demo-web
  template:
    metadata:
      labels:
        app: demo-web
    spec:
      containers:
      - name: web
        image: ghcr.io/yourorg/demo-api:v1.0.0
        ports:
        - containerPort: 8080
