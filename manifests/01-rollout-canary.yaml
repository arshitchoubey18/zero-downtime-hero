apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-api
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-api
  template:
    metadata:
      labels:
        app: demo-api
    spec:
      containers:
      - name: api
        image: nginx:stable-alpine
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet: {path: /healthz, port: 8080}
          initialDelaySeconds: 5
  strategy:
    canary:
      stableService: demo-api-stable
      canaryService: demo-api-canary
      trafficRouting:
        nginx:
          stableIngress: demo-api-ingress
          annotationPrefix: nginx.ingress.kubernetes.io
      steps:
      - setWeight: 5
      - pause: {duration: 1m}
      - setWeight: 20
      - pause: {duration: 30s}
      - analysis:
          templates:
          - templateName: success-rate
          args:
          - name: service-name
            value: demo-api
          - name: namespace
            value: production
      - setWeight: 50
      - pause: {duration: 1m}
      - setWeight: 100
      - pause: {duration: 30s}
